<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Famille Silva — Dashboard</title>
<style>
  /* ============ BASE ============ */
  :root {
    --bg: #0b0b10;
    --panel: #14141c;
    --panel-2: #1a1a24;
    --border: #26263a;
    --gold: #d4af37;
    --gold-soft: rgba(212, 175, 55, 0.12);
    --red: #a3202a;
    --text: #eceadf;
    --muted: #8b8b9e;
    --green: #3ba55d;
    --yellow: #faa81a;
    --grey: #747f8d;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(163, 32, 42, 0.18), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(212, 175, 55, 0.08), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }
  ::selection { background: var(--gold); color: #000; }

  /* ============ ÉCRAN MOT DE PASSE ============ */
  #lockScreen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(800px 400px at 50% 30%, rgba(212, 175, 55, 0.07), transparent 70%),
      var(--bg);
  }
  .lock-card {
    width: min(400px, 90vw);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 42px 34px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .crest {
    width: 74px; height: 74px; margin: 0 auto 18px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--red), #5e1218);
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-size: 34px; font-weight: bold; color: var(--gold);
    box-shadow: 0 0 40px rgba(212, 175, 55, 0.25);
  }
  .lock-card h1 { font-family: Georgia, serif; font-size: 26px; letter-spacing: 3px; text-transform: uppercase; }
  .lock-card h1 span { color: var(--gold); }
  .lock-card p.sub { color: var(--muted); font-size: 13px; margin: 8px 0 26px; letter-spacing: 1px; }
  #pwdInput {
    width: 100%; padding: 13px 16px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 15px; text-align: center; letter-spacing: 2px;
    outline: none; transition: border-color .2s;
  }
  #pwdInput:focus { border-color: var(--gold); }
  #pwdBtn {
    width: 100%; margin-top: 14px; padding: 13px;
    background: linear-gradient(135deg, var(--gold), #b8942a);
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: #14100a; cursor: pointer; transition: transform .1s, filter .2s;
  }
  #pwdBtn:hover { filter: brightness(1.1); }
  #pwdBtn:active { transform: scale(0.98); }
  #pwdError { color: #e8555f; font-size: 13px; margin-top: 12px; min-height: 18px; }
  .shake { animation: shake .35s; }
  @keyframes shake { 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-5px); } }

  /* ============ DASHBOARD ============ */
  #dashboard { display: none; max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

  header.top {
    display: flex; align-items: center; gap: 16px;
    padding-bottom: 22px; margin-bottom: 26px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .crest.small { width: 52px; height: 52px; font-size: 24px; margin: 0; }
  header.top .titles h1 { font-family: Georgia, serif; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }
  header.top .titles h1 span { color: var(--gold); }
  header.top .titles p { color: var(--muted); font-size: 12.5px; letter-spacing: 1px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  #refreshInfo { color: var(--muted); font-size: 12px; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 8px 14px; border-radius: 8px; font-size: 12.5px; cursor: pointer; transition: all .2s;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; min-height: 200px;
  }
  .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .card-head .ico {
    width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center;
    font-size: 17px; background: var(--gold-soft); border: 1px solid rgba(212,175,55,0.25);
  }
  .card-head h2 { font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
  .card-head .live-dot {
    margin-left: auto; width: 9px; height: 9px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 10px var(--green);
    animation: pulse 2s infinite;
  }
  .card-head .live-dot.off { background: #e8555f; box-shadow: 0 0 10px #e8555f; animation: none; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  .stat-row { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat {
    flex: 1; min-width: 110px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px;
  }
  .stat .num { font-size: 26px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
  .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

  .bar-wrap { background: var(--panel-2); border-radius: 99px; height: 10px; overflow: hidden; margin-bottom: 18px; border: 1px solid var(--border); }
  .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--red)); border-radius: 99px; transition: width .8s ease; }

  .search-box {
    width: 100%; padding: 10px 14px; margin-bottom: 12px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
    color: var(--text); font-size: 13.5px; outline: none;
  }
  .search-box:focus { border-color: var(--gold); }

  .list { max-height: 330px; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; padding-right: 4px; }
  .list::-webkit-scrollbar { width: 8px; }
  .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  .row {
    display: flex; align-items: center; gap: 11px;
    background: var(--panel-2); border: 1px solid transparent; border-radius: 9px;
    padding: 8px 12px; font-size: 13.5px;
  }
  .row:hover { border-color: var(--border); }
  .row img { width: 30px; height: 30px; border-radius: 50%; }
  .row .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .activity { margin-left: auto; color: var(--muted); font-size: 11.5px; max-width: 45%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .pid { margin-left: auto; color: var(--muted); font-size: 11.5px; font-variant-numeric: tabular-nums; }

  .empty, .error-msg { color: var(--muted); font-size: 13.5px; text-align: center; padding: 30px 10px; line-height: 1.7; }
  .error-msg { color: #e8918f; }

  .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .btn-main {
    flex: 1; text-align: center; text-decoration: none;
    padding: 11px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    background: var(--gold-soft); border: 1px solid rgba(212,175,55,0.35); color: var(--gold);
    transition: all .2s; min-width: 140px;
  }
  .btn-main:hover { background: rgba(212,175,55,0.22); }

  .setup-note {
    background: var(--panel-2); border: 1px dashed var(--border); border-radius: 10px;
    padding: 18px; font-size: 13px; color: var(--muted); line-height: 1.8;
  }
  .setup-note b { color: var(--gold); }
  .setup-note code { background: #0b0b10; padding: 2px 7px; border-radius: 5px; color: var(--text); font-size: 12px; }

  footer { text-align: center; color: var(--muted); font-size: 11.5px; margin-top: 40px; letter-spacing: 1px; }

  /* ============ CARTE COFFRE ============ */
  .coffre-grid { display: grid; grid-template-columns: 5fr 7fr; gap: 26px; }
  @media (max-width: 820px) { .coffre-grid { grid-template-columns: 1fr; } }
  .coffre-grid h3 {
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); font-weight: 600; margin-bottom: 12px;
  }
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th {
    text-align: right; font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--border);
  }
  .tbl th:first-child, .tbl td:first-child { text-align: left; }
  .tbl td {
    padding: 8px 10px; border-bottom: 1px solid var(--panel-2);
    text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .tbl td:first-child { white-space: normal; }
  .tbl tr:hover td { background: var(--panel-2); }
  .tbl .in { color: var(--green); }
  .tbl .out { color: #e8555f; }
  .tbl .net-pos { color: var(--gold); font-weight: 700; }
  .tbl .net-neg { color: #e8555f; font-weight: 700; }
  .tbl .net-zero { color: var(--muted); }
  .note { color: var(--muted); font-size: 11.5px; line-height: 1.6; margin-top: 12px; }

  .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filters select {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 12.5px; padding: 7px 10px; outline: none; flex: 1; min-width: 140px;
  }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button {
    background: transparent; border: none; color: var(--muted);
    font-size: 12px; padding: 7px 12px; cursor: pointer;
  }
  .seg button.on { background: var(--gold-soft); color: var(--gold); }
  .day-sep {
    color: var(--muted); font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 8px 2px 2px;
  }
</style>
</head>
<body>

<!-- ================= ÉCRAN MOT DE PASSE ================= -->
<div id="lockScreen">
  <div class="lock-card" id="lockCard">
    <div class="crest">S</div>
    <h1>Famille <span>Silva</span></h1>
    <p class="sub">ACCÈS RÉSERVÉ AUX MEMBRES</p>
    <input type="password" id="pwdInput" placeholder="Mot de passe" autocomplete="off">
    <button id="pwdBtn">Entrer</button>
    <div id="pwdError"></div>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">
  <header class="top">
    <div class="crest small">S</div>
    <div class="titles">
      <h1>Famille <span>Silva</span></h1>
      <p>DASHBOARD — FLASHBACK FA × DISCORD</p>
    </div>
    <div class="header-right">
      <span id="refreshInfo">—</span>
      <button class="btn-ghost" id="btnRefresh">Actualiser</button>
      <button class="btn-ghost" id="btnLock">Verrouiller</button>
    </div>
  </header>

  <div class="grid">

    <!-- ===== CARTE FIVEM ===== -->
    <section class="card">
      <div class="card-head">
        <div class="ico">🎮</div>
        <h2>Serveur FlashBack FA</h2>
        <div class="live-dot off" id="fivemDot"></div>
      </div>
      <div id="fivemBody">
        <div class="empty">Chargement…</div>
      </div>
    </section>

    <!-- ===== CARTE DISCORD ===== -->
    <section class="card">
      <div class="card-head">
        <div class="ico">💬</div>
        <h2>Discord de la famille</h2>
        <div class="live-dot off" id="discordDot"></div>
      </div>
      <div id="discordBody">
        <div class="empty">Chargement…</div>
      </div>
    </section>

    <!-- ===== CARTE COFFRE ===== -->
    <section class="card" style="grid-column: 1 / -1;">
      <div class="card-head">
        <div class="ico">🧰</div>
        <h2>Coffre de la famille</h2>
        <div class="live-dot off" id="coffreDot"></div>
      </div>
      <div id="coffreBody">
        <div class="empty">Chargement…</div>
      </div>
    </section>

  </div>

  <footer>FAMILLE SILVA — USAGE INTERNE · Actualisation automatique toutes les 60 secondes</footer>
</div>

<script>
/* ============================================================
   RÉGLAGES — les 2 seules choses à personnaliser
   ============================================================ */

// 1) L'identifiant de VOTRE serveur Discord (une longue suite de chiffres).
//    Voir le guide : clic droit sur le nom du serveur → "Copier l'identifiant du serveur".
//    Collez-le entre les guillemets ci-dessous.
const DISCORD_GUILD_ID = "1521913398496071790";

// 2) Le code du serveur FiveM (déjà réglé sur FlashBack FA — ne pas toucher).
const FIVEM_CODE = "k4aqg7";

// 3) L'adresse du Worker Cloudflare qui lit le coffre (déjà réglée).
const COFFRE_URL = "https://tiny-sunset-0d8a.schricke-paul.workers.dev/";

// Mot de passe actuel : silva2026 (stocké de façon chiffrée ci-dessous).
const PASSWORD_HASH = "70829cb44dffd5af81e0ee3f9b8cffabe2da8e1e14190bf4a99655ec5a05e9ec";

/* ============================================================
   NE RIEN MODIFIER SOUS CETTE LIGNE
   ============================================================ */

const FIVEM_API = "https://frontend.cfx-services.net/api/servers/single/" + FIVEM_CODE;
const DISCORD_API = "https://discord.com/api/guilds/" + DISCORD_GUILD_ID + "/widget.json";
const REFRESH_MS = 60000;

const $ = (id) => document.getElementById(id);
let fivemPlayers = [];

/* ---------- Mot de passe ---------- */
async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}

async function tryUnlock() {
  const val = $("pwdInput").value;
  if (!val) return;
  const hash = await sha256(val);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem("silva_unlocked", "1");
    unlock();
  } else {
    $("pwdError").textContent = "Mot de passe incorrect.";
    $("lockCard").classList.remove("shake");
    void $("lockCard").offsetWidth;
    $("lockCard").classList.add("shake");
    $("pwdInput").value = "";
  }
}

function unlock() {
  $("lockScreen").style.display = "none";
  $("dashboard").style.display = "block";
  refreshAll();
}

function lock() {
  sessionStorage.removeItem("silva_unlocked");
  $("dashboard").style.display = "none";
  $("lockScreen").style.display = "flex";
  $("pwdInput").value = "";
  $("pwdError").textContent = "";
}

$("pwdBtn").addEventListener("click", tryUnlock);
$("pwdInput").addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });
$("btnLock").addEventListener("click", lock);
$("btnRefresh").addEventListener("click", refreshAll);

/* ---------- FiveM ---------- */
async function loadFivem() {
  const body = $("fivemBody");
  const dot = $("fivemDot");
  try {
    const r = await fetch(FIVEM_API);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const d = j.Data || {};
    const clients = d.clients ?? 0;
    const max = d.sv_maxclients || d.svMaxclients || 2048;
    fivemPlayers = Array.isArray(d.players) ? d.players : [];
    dot.classList.remove("off");

    body.innerHTML = `
      <div class="stat-row">
        <div class="stat"><div class="num">${clients}</div><div class="lbl">Joueurs en ligne</div></div>
        <div class="stat"><div class="num">${max}</div><div class="lbl">Places max</div></div>
        <div class="stat"><div class="num">${Math.round(clients / max * 100)}%</div><div class="lbl">Remplissage</div></div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="fivemBar"></div></div>
      <input class="search-box" id="playerSearch" placeholder="🔍 Chercher un joueur (ex : Silva)…">
      <div class="list" id="playerList"></div>
      <div class="actions">
        <a class="btn-main" href="https://cfx.re/join/${FIVEM_CODE}">Rejoindre le serveur</a>
      </div>`;

    requestAnimationFrame(() => { $("fivemBar").style.width = Math.round(clients / max * 100) + "%"; });
    $("playerSearch").addEventListener("input", renderPlayers);
    renderPlayers();
  } catch (e) {
    dot.classList.add("off");
    body.innerHTML = `<div class="error-msg">Impossible de joindre le serveur FlashBack FA.<br>
      Il est peut-être hors ligne ou en redémarrage.<br>Réessaie dans une minute avec « Actualiser ».</div>`;
  }
}

function renderPlayers() {
  const q = ($("playerSearch")?.value || "").toLowerCase().trim();
  const list = $("playerList");
  if (!list) return;
  const shown = q
    ? fivemPlayers.filter(p => (p.name || "").toLowerCase().includes(q))
    : fivemPlayers.slice(0, 30);
  if (!shown.length) {
    list.innerHTML = `<div class="empty">${q ? "Aucun joueur trouvé pour « " + escapeHtml(q) + " »." : "Aucun joueur."}</div>`;
    return;
  }
  list.innerHTML = shown.slice(0, 100).map(p => `
    <div class="row">
      <span class="status-dot" style="background: var(--green)"></span>
      <span class="name">${escapeHtml(p.name || "?")}</span>
      <span class="pid">#${p.id ?? "—"}</span>
    </div>`).join("")
    + (!q && fivemPlayers.length > 30
        ? `<div class="empty">… et ${fivemPlayers.length - 30} autres. Utilise la recherche pour trouver quelqu'un.</div>`
        : "");
}

/* ---------- Discord ---------- */
async function loadDiscord() {
  const body = $("discordBody");
  const dot = $("discordDot");

  if (!DISCORD_GUILD_ID) {
    dot.classList.add("off");
    body.innerHTML = `
      <div class="setup-note">
        <b>Dernière étape de configuration :</b><br>
        1. Ouvre Discord → ton serveur → <b>Paramètres du serveur</b> → <b>Widget</b> → active
        « <b>Activer le widget du serveur</b> ».<br>
        2. Sur la même page, copie l'<b>ID du serveur</b>.<br>
        3. Donne cet identifiant à Claude (ou colle-le dans le fichier, ligne
        <code>DISCORD_GUILD_ID = ""</code>).
      </div>`;
    return;
  }

  try {
    const r = await fetch(DISCORD_API);
    if (r.status === 403) throw new Error("WIDGET_OFF");
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    const members = d.members || [];
    dot.classList.remove("off");

    const statusColor = { online: "var(--green)", idle: "var(--yellow)", dnd: "var(--red)" };
    body.innerHTML = `
      <div class="stat-row">
        <div class="stat"><div class="num">${d.presence_count ?? members.length}</div><div class="lbl">Membres en ligne</div></div>
        <div class="stat"><div class="num">${escapeHtml(d.name || "Discord")}</div><div class="lbl">Serveur</div></div>
      </div>
      <div class="list">
        ${members.length ? members.map(m => `
          <div class="row">
            <img src="${m.avatar_url}" alt="" loading="lazy">
            <span class="status-dot" style="background:${statusColor[m.status] || "var(--grey)"}"></span>
            <span class="name">${escapeHtml(m.username)}</span>
            ${m.game ? `<span class="activity">🎮 ${escapeHtml(m.game.name)}</span>` : ""}
          </div>`).join("") : `<div class="empty">Personne en ligne pour le moment.</div>`}
      </div>
      ${d.instant_invite ? `<div class="actions"><a class="btn-main" href="${d.instant_invite}" target="_blank" rel="noopener">Ouvrir le Discord</a></div>` : ""}`;
  } catch (e) {
    dot.classList.add("off");
    body.innerHTML = e.message === "WIDGET_OFF"
      ? `<div class="setup-note"><b>Le widget Discord est désactivé.</b><br>
         Ouvre Discord → <b>Paramètres du serveur</b> → <b>Widget</b> → active
         « <b>Activer le widget du serveur</b> », puis clique sur « Actualiser » ici.</div>`
      : `<div class="error-msg">Impossible de joindre Discord.<br>Vérifie ta connexion puis clique sur « Actualiser ».</div>`;
  }
}

/* ---------- Coffre ---------- */
let coffreData = null;
let coffreFilterItem = "";
let coffreFilterAction = "";

const fmtNum = (n) => n.toLocaleString("fr-FR");

async function loadCoffre() {
  const body = $("coffreBody");
  const dot = $("coffreDot");
  try {
    const r = await fetch(COFFRE_URL);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    dot.classList.remove("off");
    coffreData = d;

    const depuis = d.depuis ? new Date(d.depuis).toLocaleDateString("fr-FR") : "?";
    const moves = d.mouvements || [];

    // Bilan par objet : fourni par le Worker (calculé sur tout l'historique).
    // Fallback : si le Worker n'est pas à jour, on recalcule ici.
    let bilan = d.bilan;
    if (!bilan) {
      bilan = {};
      for (const mv of moves.slice().reverse()) {
        const b = (bilan[mv.item] = bilan[mv.item] || { in: 0, out: 0, net: 0, _min: 0 });
        b[mv.action === "dépôt" ? "in" : "out"] += mv.qty;
        b.net += mv.action === "dépôt" ? mv.qty : -mv.qty;
        if (b.net < b._min) b._min = b.net;
      }
      for (const b of Object.values(bilan)) { b.estime = -b._min + b.net; }
    }
    const items = Object.keys(bilan).sort((a, b) =>
      (bilan[b].in + bilan[b].out) - (bilan[a].in + bilan[a].out));
    const rows = items.map(item => {
      const b = bilan[item];
      return `<tr>
        <td>${escapeHtml(item)}</td>
        <td class="in">+${fmtNum(b.in)}</td>
        <td class="out">−${fmtNum(b.out)}</td>
        <td class="net-pos">${fmtNum(b.estime)}</td>
      </tr>`;
    }).join("");

    body.innerHTML = `
      <div class="coffre-grid">
        <div>
          <h3>Stock du coffre</h3>
          <table class="tbl">
            <thead><tr><th>Objet</th><th>Entrées</th><th>Sorties</th><th>En stock</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="4" class="empty">Aucun objet détecté.</td></tr>`}</tbody>
          </table>
          <p class="note">Stock calculé automatiquement depuis le journal (démarré le ${depuis}).
          C'est une estimation basse : ce qui était déjà dans le coffre avant le ${depuis}
          et n'a jamais bougé depuis ne peut pas être compté.</p>
        </div>
        <div>
          <h3>Mouvements (${fmtNum(moves.length)})</h3>
          <div class="filters">
            <select id="coffreItemSel">
              <option value="">Tous les objets</option>
              ${items.map(i => `<option value="${escapeHtml(i)}" ${i === coffreFilterItem ? "selected" : ""}>${escapeHtml(i)}</option>`).join("")}
            </select>
            <div class="seg">
              <button data-act="" class="${coffreFilterAction === "" ? "on" : ""}">Tous</button>
              <button data-act="dépôt" class="${coffreFilterAction === "dépôt" ? "on" : ""}">Dépôts</button>
              <button data-act="retrait" class="${coffreFilterAction === "retrait" ? "on" : ""}">Retraits</button>
            </div>
          </div>
          <div class="list" id="coffreMoves" style="max-height: 380px;"></div>
        </div>
      </div>`;

    $("coffreItemSel").addEventListener("change", (e) => { coffreFilterItem = e.target.value; renderCoffreMoves(); });
    for (const btn of body.querySelectorAll(".seg button")) {
      btn.addEventListener("click", () => {
        coffreFilterAction = btn.dataset.act;
        for (const b of body.querySelectorAll(".seg button")) b.classList.toggle("on", b === btn);
        renderCoffreMoves();
      });
    }
    renderCoffreMoves();
  } catch (e) {
    dot.classList.add("off");
    body.innerHTML = `<div class="error-msg">Impossible de lire le coffre pour le moment.<br>Réessaie avec « Actualiser » dans une minute.</div>`;
  }
}

function renderCoffreMoves() {
  const list = $("coffreMoves");
  if (!list || !coffreData) return;
  let moves = coffreData.mouvements || [];
  if (coffreFilterItem) moves = moves.filter(m => m.item === coffreFilterItem);
  if (coffreFilterAction) moves = moves.filter(m => m.action === coffreFilterAction);

  if (!moves.length) {
    list.innerHTML = `<div class="empty">Aucun mouvement pour ce filtre.</div>`;
    return;
  }

  const fmtTime = (iso) => new Date(iso).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
  const dayLabel = (iso) => {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(Date.now() - 86400000);
    if (d.toDateString() === today.toDateString()) return "Aujourd'hui";
    if (d.toDateString() === yesterday.toDateString()) return "Hier";
    return d.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
  };

  let html = "";
  let lastDay = "";
  for (const mv of moves.slice(0, 120)) {
    const day = dayLabel(mv.date);
    if (day !== lastDay) { html += `<div class="day-sep">${day}</div>`; lastDay = day; }
    const isIn = mv.action === "dépôt";
    html += `
      <div class="row">
        <span class="status-dot" style="background:${isIn ? "var(--green)" : "#e8555f"}"></span>
        <span class="name">${escapeHtml(mv.qui)} · <b style="color:${isIn ? "var(--green)" : "#e8555f"}">${isIn ? "+" : "−"}${fmtNum(mv.qty)}</b> ${escapeHtml(mv.item)}</span>
        <span class="pid">${fmtTime(mv.date)}</span>
      </div>`;
  }
  list.innerHTML = html;
}

/* ---------- Utilitaires ---------- */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function refreshAll() {
  loadFivem();
  loadDiscord();
  loadCoffre();
  $("refreshInfo").textContent = "Mis à jour à " + new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

setInterval(() => {
  if ($("dashboard").style.display === "block") refreshAll();
}, REFRESH_MS);

/* ---------- Démarrage ---------- */
if (sessionStorage.getItem("silva_unlocked") === "1") unlock();
else $("pwdInput").focus();
</script>
</body>
</html>
